<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메인페이지</title>
    <style>
        body {
            max-width: 600px;
            margin: 50px auto;
        }

        h1 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .회원카드 {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<h1>회원목록</h1>

    {% for 회원 in 회원들 %}
    <div class="회원카드">
        <p>이름 : {{회원.name}}</p>
        <p>이메일 : {{회원.email}}</p>
        <a href="/회원/{{회원.id}}">상세보기</a>
    </div>
    {% endfor %}
</body>
</html>
