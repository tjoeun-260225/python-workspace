version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: my-mongo
    # 클라이언트 = MongoClient("mongodb://admin:password@localhost:27017/")
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: