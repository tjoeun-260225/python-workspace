<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <title>Order Explorer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
        h1   { font-size: 1.8rem; margin-bottom: .3rem; color: #fff; }
        .subtitle { color: #888; font-size: .9rem; margin-bottom: 2rem; }
        .card { background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: .85rem; color: #888; margin-bottom: 1rem; letter-spacing: .08em; text-transform: uppercase; }
        .row { display: flex; gap: .8rem; flex-wrap: wrap; align-items: center; }
        input[type="text"], input[type="number"] { background: #0f1117; border: 1px solid #2a2d3e; border-radius: 8px; color: #e0e0e0; padding: .5rem 1rem; font-size: .9rem; outline: none; }
        input:focus { border-color: #6366f1; }
        input[type="number"] { width: 90px; }
        input[type="text"]   { flex: 1; min-width: 200px; }
        button { padding: .5rem 1.2rem; border: none; border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer; }
        button:hover { opacity: .8; }
        .btn-primary { background: #6366f1; color: #fff; }
        .btn-danger  { background: #ef4444; color: #fff; }
        .btn-ghost   { background: #2a2d3e; color: #e0e0e0; }
        .btn-green   { background: #16a34a; color: #fff; }
        .stats-grid  { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
        .stat-box    { background: #0f1117; border: 1px solid #2a2d3e; border-radius: 10px; padding: 1rem 1.2rem; }
        .stat-box .label { font-size: .72rem; color: #666; margin-bottom: .3rem; }
        .stat-box .value { font-size: 1.6rem; font-weight: 700; color: #fff; }
        .status-grid { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: .8rem; }
        .status-chip { background: #2a2d3e; border-radius: 8px; padding: .4rem .9rem; font-size: .8rem; }
        .status-chip span { font-weight: 700; color: #a5b4fc; }
        table { width: 100%; border-collapse: collapse; font-size: .82rem; }
        th { background: #12141e; color: #666; font-weight: 600; padding: .6rem .8rem; text-align: left; border-bottom: 1px solid #2a2d3e; }
        td { padding: .6rem .8rem; border-bottom: 1px solid #1e2030; color: #ccc; }
        tr:hover td { background: #1e2133; }
        .pagination { display: flex; gap: .4rem; margin-top: 1rem; justify-content: center; flex-wrap: wrap; }
        .pagination button { padding: .3rem .8rem; font-size: .78rem; }
        .pagination button.active { background: #6366f1; color: #fff; }
        .result-count { font-size: .8rem; color: #888; margin-bottom: .8rem; }
        #msg { min-height: 1.4rem; font-size: .85rem; color: #4ade80; margin-top: .6rem; }
        .empty { color: #555; font-size: .85rem; padding: 1rem 0; }
        .section-divider { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 900px) { .section-divider { grid-template-columns: 1fr; } }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 600; }
        .badge-blue   { background: #1e3a5f; color: #60a5fa; }
        .badge-yellow { background: #3f3000; color: #fbbf24; }
        .badge-green  { background: #1a4731; color: #4ade80; }
        .badge-red    { background: #4a1a1a; color: #f87171; }
    </style>
</head>
<body>

<h1>Order Explorer</h1>
<p class="subtitle">MySQL + Elasticsearch + Kibana · 주문 관리 데모</p>

<!-- 데이터 생성 -->
<div class="card">
    <h2>더미 데이터 생성</h2>
    <div class="row">
        <input type="number" id="seedCount" value="10" min="1" max="200"/>
        <button class="btn-primary" onclick="seed()">유저+주문 생성</button>
        <button class="btn-danger"  onclick="deleteAll()">전체 삭제</button>
    </div>
    <div id="msg"></div>
</div>

<!-- 통계 -->
<div class="card">
    <h2>통계</h2>
    <div class="stats-grid">
        <div class="stat-box"><div class="label">전체 주문 (MySQL)</div><div class="value" id="statOrders">{{ total_orders }}</div></div>
        <div class="stat-box"><div class="label">전체 유저</div><div class="value" id="statUsers">{{ total_users }}</div></div>
        <div class="stat-box"><div class="label">상품 종류</div><div class="value" id="statProducts">{{ total_products }}</div></div>
        <div class="stat-box"><div class="label">ES 도큐먼트</div><div class="value" id="statES">-</div></div>
    </div>
    <div class="status-grid" id="statusGrid"></div>
    <br/>
    <button class="btn-ghost" onclick="loadStats()">새로고침</button>
</div>

<!-- 검색 -->
<div class="section-divider">
    <div class="card">
        <h2>MySQL 검색</h2>
        <div class="row">
            <input type="text" id="mysqlQ" placeholder="고객명, 상품명, 카테고리, 상태..."/>
            <button class="btn-green" onclick="mysqlSearch()">검색</button>
        </div>
        <br/>
        <div id="mysqlResult"></div>
    </div>
    <div class="card">
        <h2>Elasticsearch 검색</h2>
        <div class="row">
            <input type="text" id="esQ" placeholder="고객명, 상품명, 카테고리, 상태..."/>
            <button class="btn-primary" onclick="esSearch()">검색</button>
        </div>
        <br/>
        <div id="esResult"></div>
    </div>
</div>

<!-- 주문 목록 -->
<div class="card">
    <h2>주문 목록 (전체)</h2>
    <div id="tableWrap"></div>
    <div class="pagination" id="pagination"></div>
</div>

<script>
    const COLS = ['id','user_name','product_name','category','quantity','total_price','status','created_at'];

    const STATUS_BADGE = {
        '결제완료': 'badge-blue',
        '배송중':   'badge-yellow',
        '배송완료': 'badge-green',
        '취소':     'badge-red',
    };

    function msg(text, color = '#4ade80') {
        const el = document.getElementById('msg');
        el.style.color = color;
        el.textContent = text;
    }

    function fmtPrice(v) {
        return v != null ? Number(v).toLocaleString() + '원' : '';
    }

    function buildTable(rows) {
        if (!rows || !rows.length) return '<p class="empty">결과 없음</p>';
        const ths  = COLS.map(c => `<th>${c}</th>`).join('');
        const trs  = rows.map(r => {
            const tds = COLS.map(c => {
                if (c === 'status') {
                    const cls = STATUS_BADGE[r[c]] || 'badge-blue';
                    return `<td><span class="badge ${cls}">${r[c]}</span></td>`;
                }
                if (c === 'total_price') return `<td>${fmtPrice(r[c])}</td>`;
                return `<td>${r[c] ?? ''}</td>`;
            }).join('');
            return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    }

    async function seed() {
        const count = +document.getElementById('seedCount').value || 10;
        msg('생성 중...');
        const data = await fetch('/api/seed', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({count})
        }).then(r => r.json());
        msg(`주문 ${data.added}건 추가 (총 ${data.total}건)`);
        loadStats();
        loadOrders(1);
    }

    async function deleteAll() {
        if (!confirm('전체 데이터를 삭제할까요?')) return;
        await fetch('/api/delete_all', {method: 'DELETE'});
        msg('삭제 완료', '#f87171');
        loadStats();
        loadOrders(1);
        document.getElementById('mysqlResult').innerHTML = '';
        document.getElementById('esResult').innerHTML    = '';
    }

    async function loadStats() {
        const d = await fetch('/api/stats').then(r => r.json());
        document.getElementById('statOrders').textContent   = d.mysql_orders;
        document.getElementById('statUsers').textContent    = d.mysql_users;
        document.getElementById('statProducts').textContent = d.mysql_products;
        document.getElementById('statES').textContent       = d.elasticsearch;

        const sg = document.getElementById('statusGrid');
        sg.innerHTML = Object.entries(d.status || {})
            .map(([s, c]) => `<div class="status-chip">${s} <span>${c}</span></div>`)
            .join('');
    }

    async function loadOrders(page = 1) {
        const data = await fetch(`/api/orders?page=${page}&per=10`).then(r => r.json());
        document.getElementById('tableWrap').innerHTML = buildTable(data.orders);
        const pg = document.getElementById('pagination');
        pg.innerHTML = '';
        for (let i = 1; i <= data.pages; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.className   = 'btn-ghost' + (i === page ? ' active' : '');
            btn.onclick     = () => loadOrders(i);
            pg.appendChild(btn);
        }
    }

    async function mysqlSearch() {
        const q = document.getElementById('mysqlQ').value.trim();
        if (!q) return;
        const data = await fetch(`/api/mysql_search?q=${encodeURIComponent(q)}`).then(r => r.json());
        document.getElementById('mysqlResult').innerHTML =
            `<p class="result-count">MySQL 결과 ${data.total}건</p>` + buildTable(data.orders);
    }

    async function esSearch() {
        const q = document.getElementById('esQ').value.trim();
        if (!q) return;
        const data = await fetch(`/api/search?q=${encodeURIComponent(q)}`).then(r => r.json());
        document.getElementById('esResult').innerHTML =
            `<p class="result-count">ES 결과 ${data.total}건</p>` + buildTable(data.hits);
    }

    document.getElementById('mysqlQ').addEventListener('keydown', e => { if (e.key === 'Enter') mysqlSearch(); });
    document.getElementById('esQ').addEventListener('keydown',    e => { if (e.key === 'Enter') esSearch(); });

    loadStats();
    loadOrders(1);
</script>
</body>
</html>
